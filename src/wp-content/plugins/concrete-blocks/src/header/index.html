<div data-name="concrete/header" data-title="Concrete Header" data-category="theme" data-editing-mode="contentOnly" class="site-header-wrap">
  <header class="site-header bg-transparent" id="site-header">
    <nav class="main-navigation">
      <div class="nav-container">
        <div class="logo">
          <a href="/" class="site-title" aria-label="ConcreteHP homepage">
            <span class="logo-mark" data-bind="logoMark">Concrete<span class="logo-star">HP</span></span>
            <span class="logo-subtitle" data-bind="logoSubtitle">ConcreteHP</span>
          </a>
        </div>
        <div class="nav-right">
          <ul id="primary-menu">
            <li><a href="/#business" data-bind="menuBusiness">Business</a></li>
            <li><a href="/#projects" data-bind="menuProjects">Projects</a></li>
            <li><a href="/#environment" data-bind="menuEnvironment">Environment</a></li>
            <li><a href="/#news" data-bind="menuNews">Culture &amp; Events</a></li>
            <li><a href="/careers" data-bind="menuCareers">Careers</a></li>
          </ul>
          <div class="language-switcher">
            <a href="/" class="active" data-bind="langVi">VI</a>
            <span class="separator">|</span>
            <a href="/en/" data-bind="langEn">EN</a>
          </div>
          <a class="header-action" href="/careers" data-bind="ctaText">Join Us</a>
          <button class="menu-toggle" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </nav>
  </header>
  <section class="mobile-menu-overlay" id="mobile-menu">
    <button class="mobile-menu-close" aria-label="Close menu">&times;</button>
    <ul>
      <li><a href="/#business" data-bind="menuBusiness">Business</a></li>
      <li><a href="/#projects" data-bind="menuProjects">Projects</a></li>
      <li><a href="/#environment" data-bind="menuEnvironment">Environment</a></li>
      <li><a href="/#news" data-bind="menuNews">Culture &amp; Events</a></li>
      <li><a href="/careers" data-bind="menuCareers">Careers</a></li>
    </ul>
    <div class="mobile-lang-switcher">
      <a href="/" class="active" data-bind="langVi">VI</a>
      <a href="/en/" data-bind="langEn">EN</a>
    </div>
  </section>
</div>
